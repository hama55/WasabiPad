name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run tauri build

      - name: Collect files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          Copy-Item src-tauri/target/release/petapad.exe release/petapad.exe
          Get-ChildItem src-tauri/target/release/bundle/nsis/*-setup.exe |
            Copy-Item -Destination release

      - name: Publish release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $installer = Get-ChildItem release/*-setup.exe | Select-Object -First 1
          gh release create $env:GITHUB_REF_NAME `
            release/petapad.exe `
            $installer.FullName `
            --title $env:GITHUB_REF_NAME `
            --generate-notes
